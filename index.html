<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS Агрегатор</title>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">RSS Агрегатор</a>
      </div>
    </nav>

    <main>
      <div class="container-xxl">
        <div class="row mt-5 justify-content-center">
          <div class="col-md-10 col-lg-8">

            <div class="text-center mb-4">
              <h1 class="display-5 fw-bold">Читайте только нужное!</h1>
              <p class="lead text-muted">
                Начните читать RSS сегодня! Это легко, это красиво.
              </p>
            </div>

            <form id="rss-form" class="row g-2">
              <div class="col">
                <label for="rss-input" class="form-label">Ссылка RSS</label>
                <input
                  id="rss-input"
                  type="url"
                  name="url"
                  class="form-control form-control-lg"
                  placeholder="Ссылка RSS"
                  autocomplete="off"
                  required
                  autofocus
                />
              </div>
              <div class="col-auto d-flex align-items-end">
                <button type="submit" class="btn btn-lg btn-primary">
                  Добавить
                </button>
              </div>
            </form>

            <p id="feedback" class="mt-2 mb-0 small"></p>
            <p class="mt-2 mb-0 text-muted small">
              Пример: https://ru.hexlet.io/lessons.rss
            </p>

          </div>
        </div>

        <div class="row mt-5">
          <div class="col-md-4" id="feeds"></div>
          <div class="col-md-8" id="posts"></div>
        </div>
      </div>
    </main>

    <!-- Модальное окно -->
    <div
      class="modal fade"
      id="modal"
      tabindex="-1"
      aria-labelledby="modalTitle"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle"></h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body" id="modalBody"></div>
          <div class="modal-footer">
            <a
              id="modalReadLink"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              role="button"
              class="btn btn-primary"
            >Читать полностью</a>
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
              id="modalClose"
            >Закрыть</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer mt-5 py-3 bg-light border-top">
      <div class="container text-center text-muted">
        <span>RSS Агрегатор</span>
      </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
